<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICEKAS - Puskesmas Banjaran Kota</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; }
        iframe { border: none; width: 100%; height: 100%; display: block; position: relative; z-index: 1; }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #0f3d37 50%, #0d9488 100%);
            transition: opacity 0.8s ease, transform 0.5s ease;
        }
        #splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

        @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.9} 50%{transform:scale(1.1);opacity:1} }
        @keyframes barFill { 0%{width:0} 80%{width:85%} 100%{width:100%} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes shimmer { 0%{background-position:-200px 0} 100%{background-position:200px 0} }

        .sp-icon {
            width: 90px; height: 90px; border-radius: 24px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            animation: pulse 2s ease-in-out infinite; margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .sp-title {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white; text-align: center; animation: fadeUp 0.8s ease forwards;
        }
        .sp-title h1 {
            font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; margin: 0 0 6px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .sp-title p {
            font-size: 0.78rem; opacity: 0.6; letter-spacing: 1.5px; font-weight: 500; margin: 0;
        }
        .sp-bar-wrap {
            width: 220px; height: 4px; background: rgba(255,255,255,0.12);
            border-radius: 4px; margin-top: 32px; overflow: hidden;
        }
        .sp-bar {
            height: 100%; border-radius: 4px;
            background: linear-gradient(90deg, #22c55e, #14b8a6, #22c55e);
            background-size: 200px 100%;
            animation: barFill 6s ease-in-out forwards, shimmer 1.5s linear infinite;
        }
        .sp-hint {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: rgba(255,255,255,0.4); font-size: 0.7rem; margin-top: 16px;
            font-weight: 500; letter-spacing: 0.5px;
            animation: fadeUp 1s ease 0.3s both;
        }
    </style>
</head>
<body>
    <!-- SPLASH LOADING -->
    <div id="splash">
        <div class="sp-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="white" class="bi bi-hospital" viewBox="0 0 16 16">
                <path d="M8.5 5.034v1.1l.953-.55.5.867L9 7l.953.55-.5.866-.953-.55v1.1h-1v-1.1l-.953.55-.5-.866L7 7l-.953-.55.5-.866.953.55v-1.1zM13.25 9a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25zM13 11.25a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zm-2.25-2.25a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25zm0 2.5a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25zM3.5 9a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25zM3 11.25a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25z"/>
                <path d="M2 1a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1h1a1 1 0 0 1 1 1v10.5a1.5 1.5 0 0 1-1.5 1.5h-1v1a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-1h-1A1.5 1.5 0 0 1 0 13.5V3a1 1 0 0 1 1-1zm2 13h8v1H4zm2-13a1 1 0 0 0-1 1v.6h.5a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-.5.5H5v.5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-.5h-.5a.5.5 0 0 1-.5-.5v-8a.5.5 0 0 1 .5-.5h.5V2a1 1 0 0 0-1-1zm-4 3v8.5a.5.5 0 0 0 .5.5h.5v-9zM12 4.6v9h.5a.5.5 0 0 0 .5-.5V3h-.5z"/>
            </svg>
        </div>
        <div class="sp-title">
            <h1>SICEKAS</h1>
            <p>Sistem Informasi Catat Pelaporan Puskesmas</p>
        </div>
        <div class="sp-bar-wrap"><div class="sp-bar"></div></div>
        <div class="sp-hint">Memuat aplikasi...</div>
    </div>

    <!-- IFRAME GAS -->
    <iframe id="appFrame"
        src="https://script.google.com/macros/s/AKfycbwyS-ptP_XG_yRozjsdPWfj_n5dlAOTsmKY2sSFRE6AuFFxGrnAS706Z63-LZVQw0DL/exec"
        onload="hideSplash()">
    </iframe>

    <script>
        function hideSplash() {
            const sp = document.getElementById('splash');
            if (sp) {
                sp.classList.add('hide');
                setTimeout(() => sp.remove(), 900);
            }
        }
        // Fallback: jika iframe terlalu lama, hilangkan splash setelah 15 detik
        setTimeout(hideSplash, 15000);
    </script>
</body>
</html>
